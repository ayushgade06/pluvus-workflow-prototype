name: CI

# C4: the test suites and the classification eval gate existed but nothing ran
# them automatically — a gate that never runs is not a gate. This workflow runs
# both the Python agent tests (incl. the eval regression gate) and the TypeScript
# server tests on every push / PR, so a regression fails the build.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  agent-tests:
    name: Python agent tests + eval gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        # The unit tests use fake LLMs and pure gate functions — no network. We
        # DO install langgraph + langchain-ollama so the tests that wrap the graph
        # (_langgraph_classify / _langgraph_negotiate, all fed a FakeLLM) actually
        # RUN instead of being skipped by pytest.importorskip. RUN_LLM_EVAL is left
        # unset so no real model is ever contacted.
        run: |
          python -m pip install --upgrade pip
          pip install fastapi "uvicorn[standard]" httpx python-dotenv pydantic pytest pytest-asyncio
          pip install "langgraph>=0.1.0" "langchain-ollama>=0.2.0"
          # HARD-K1: pypdf is used by the brief-parser (app/brief.py) + its tests.
          pip install "pypdf>=4.0.0"

      - name: Run pytest
        # Includes the HARD-T1 deterministic negotiation eval gate
        # (test_negotiation_eval_gate.py): every run_eval.py case is machine-
        # asserted, and Case-19 (above-ceiling on the final round) is asserted to
        # ESCALATE — the offline tripwire for CRITICAL-4. The full 22-case LIVE
        # eval (run_eval.py, ASSERTS covers every case) is opt-in below because it
        # needs a running agent + model; it is NOT part of the default CI run.
        run: python -m pytest -q

      # HARD-T1 (live eval gate) — OPT-IN. run_eval.py drives the real
      # /negotiate + /draft endpoints against a running agent on a real model, so
      # it cannot run on a stock GitHub runner. To enable it, provision a runner
      # with the model available (Ollama/qwen or an OpenAI key), start the agent,
      # and set RUN_LLM_EVAL=1 + AGENT_URL. The step exits non-zero on any ASSERTS
      # failure, gating the merge on real model behavior. Left disabled by default
      # so CI stays deterministic and offline.
      - name: Run live negotiation eval (opt-in)
        if: ${{ env.RUN_LLM_EVAL == '1' }}
        env:
          AGENT_URL: ${{ env.AGENT_URL }}
        run: python tests/negotiation_eval/run_eval.py

  server-tests:
    name: TypeScript server tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        # Prisma client is generated on install; the unit tests are pure logic and
        # run under NODE_ENV=test (providers stay on mock — no agent-service HTTP).
        run: npm ci --workspaces --include-workspace-root

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run server unit tests
        run: npm test
